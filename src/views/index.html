<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PleaseEat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>

    <header>
      <h1>🍽️ PleaseEat</h1>
      <nav>
        <button class="nav-btn active" onclick="showPage('recipes')">See All Recipes</button>
        <button class="nav-btn" onclick="showPage('create')">Create Recipe</button>
      </nav>
    </header>

    <!-- ── See All Recipes ── -->
    <main id="page-recipes" class="page">
      <div class="page-header">
        <h2>All Recipes</h2>
        <button id="btn-load" class="btn btn-primary" onclick="loadRecipes()">Refresh</button>
      </div>
      <div id="recipe-list" class="recipe-grid">
        <p class="empty-state">Loading recipes…</p>
      </div>
    </main>

    <!-- ── Create Recipe ── -->
    <main id="page-create" class="page hidden">
      <div class="page-header">
        <h2>Create a Recipe</h2>
      </div>

      <form class="recipe-form" onsubmit="submitCreate(event)">

        <div class="form-group">
          <label for="f-title">Title <span class="required">*</span></label>
          <input id="f-title" type="text" placeholder="e.g. Scrambled Eggs" required />
        </div>

        <div class="form-group">
          <label for="f-ingredients">Ingredients <span class="required">*</span></label>
          <p class="field-hint">One ingredient per line</p>
          <textarea id="f-ingredients" rows="5" placeholder="2 eggs&#10;butter&#10;salt" required></textarea>
        </div>

        <div class="form-group">
          <label for="f-instructions">Instructions <span class="required">*</span></label>
          <textarea id="f-instructions" rows="4" placeholder="Beat eggs, melt butter, scramble gently." required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-prep">Prep time (min)</label>
            <input id="f-prep" type="number" min="0" placeholder="5" />
          </div>
          <div class="form-group">
            <label for="f-cook">Cook time (min)</label>
            <input id="f-cook" type="number" min="0" placeholder="10" />
          </div>
          <div class="form-group">
            <label for="f-servings">Servings</label>
            <input id="f-servings" type="number" min="1" placeholder="2" />
          </div>
        </div>

        <div id="form-feedback" class="feedback hidden"></div>

        <button id="btn-create" type="submit" class="btn btn-primary">Create Recipe</button>

      </form>
    </main>

    <script src="/main.js"></script>

  </body>
</html>
